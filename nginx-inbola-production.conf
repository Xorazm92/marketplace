# ==========================================
# INBOLA Marketplace - Production Nginx Configuration
# ==========================================
# Optimized for inbola.uz with SSL, security, and performance

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

# Upstream servers
upstream inbola_backend {
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream inbola_frontend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ==========================================
# HTTP to HTTPS Redirect
# ==========================================
server {
    listen 80;
    server_name inbola.uz www.inbola.uz api.inbola.uz admin.inbola.uz;
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# Main Website - Frontend (inbola.uz)
# ==========================================
server {
    listen 443 ssl http2;
    server_name inbola.uz www.inbola.uz;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/inbola.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inbola.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/inbola.uz/chain.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.inbola.uz wss://api.inbola.uz;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Performance Settings
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;
    
    # Rate limiting
    limit_req zone=general burst=50 nodelay;
    
    # Client settings
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Proxy settings for Next.js
    location / {
        proxy_pass http://inbola_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60s;
        
        # Handle Next.js routing
        try_files $uri $uri/ @nextjs;
    }
    
    # Next.js fallback
    location @nextjs {
        proxy_pass http://inbola_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static files optimization
    location /_next/static/ {
        proxy_pass http://inbola_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        access_log off;
    }
    
    # Images and assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        proxy_pass http://inbola_frontend;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Cache-Status "IMAGE";
        access_log off;
    }
    
    # Fonts
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        proxy_pass http://inbola_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }
    
    # CSS and JS
    location ~* \.(css|js)$ {
        proxy_pass http://inbola_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # API calls from frontend to backend
    location /api/ {
        proxy_pass http://inbola_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "https://inbola.uz" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
    }
    
    # Error pages
    error_page 404 /404;
    error_page 500 502 503 504 /500;
    
    # Logging
    access_log /var/log/nginx/inbola_access.log;
    error_log /var/log/nginx/inbola_error.log;
}

# ==========================================
# API Backend (api.inbola.uz)
# ==========================================
server {
    listen 443 ssl http2;
    server_name api.inbola.uz;

    # SSL Configuration (same as main site)
    ssl_certificate /etc/letsencrypt/live/inbola.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inbola.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/inbola.uz/chain.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers for API
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CORS Configuration
    add_header Access-Control-Allow-Origin "https://inbola.uz" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range,X-Total-Count" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Rate limiting for API
    limit_req zone=api burst=20 nodelay;

    # Client settings for file uploads
    client_max_body_size 50M;
    client_body_timeout 300s;
    client_header_timeout 60s;

    # Handle preflight OPTIONS requests
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "https://inbola.uz";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin";
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Content-Length 0;
        return 204;
    }

    # Main API proxy
    location / {
        proxy_pass http://inbola_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
    }

    # GraphQL endpoint with WebSocket support
    location /graphql {
        proxy_pass http://inbola_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60s;
    }

    # File uploads endpoint
    location /uploads/ {
        proxy_pass http://inbola_backend;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Authentication endpoints with stricter rate limiting
    location ~ ^/(auth|login|register|otp)/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://inbola_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://inbola_backend;
        access_log off;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Admin API endpoints
    location /admin/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://inbola_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Logging
    access_log /var/log/nginx/api_inbola_access.log;
    error_log /var/log/nginx/api_inbola_error.log;
}

# ==========================================
# Admin Panel (admin.inbola.uz) - Optional
# ==========================================
server {
    listen 443 ssl http2;
    server_name admin.inbola.uz;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/inbola.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inbola.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/inbola.uz/chain.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Enhanced Security Headers for Admin
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.inbola.uz;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Stricter rate limiting for admin
    limit_req zone=login burst=3 nodelay;

    # Admin panel proxy (redirect to main site /admin path)
    location / {
        proxy_pass http://inbola_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host inbola.uz;  # Use main domain
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;

        # Rewrite to admin path
        rewrite ^/(.*)$ /admin/$1 break;
    }

    # Logging
    access_log /var/log/nginx/admin_inbola_access.log;
    error_log /var/log/nginx/admin_inbola_error.log;
}
