version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: inbola_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inbola_db
      POSTGRES_USER: inbola_user
      POSTGRES_PASSWORD: InBoLa_Pr0d_DB_P@ssw0rd_2024_Secure!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - inbola_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbola_user -d inbola_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: inbola_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass InBoLa_R3d1s_Pr0d_P@ssw0rd_2024_S3cur3!
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - inbola_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend-main
      dockerfile: Dockerfile
    container_name: inbola_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://inbola_user:InBoLa_Pr0d_DB_P@ssw0rd_2024_Secure!@postgres:5432/inbola_db
      REDIS_URL: redis://:InBoLa_R3d1s_Pr0d_P@ssw0rd_2024_S3cur3!@redis:6379
      ACCESS_TOKEN_KEY: InBoLa_Pr0duct10n_@ccess_T0ken_K3y_2024_V3ry_S3cur3_R@nd0m_Str1ng_64_Ch@rs_M1n1mum_F0r_M@x1mum_S3cur1ty!
      REFRESH_TOKEN_KEY: InBoLa_Pr0duct10n_R3fr3sh_T0ken_K3y_2024_V3ry_S3cur3_R@nd0m_Str1ng_64_Ch@rs_M1n1mum_F0r_M@x1mum_S3cur1ty!
      SMS_TOKEN: your_production_sms_token_here
      FRONTEND_URL: https://inbola.uz
    volumes:
      - backend_uploads:/app/public/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inbola_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./front-main
      dockerfile: Dockerfile
    container_name: inbola_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_URL: https://inbola.uz
      NEXT_PUBLIC_API_URL: https://inbola.uz/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - inbola_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: inbola_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - backend_uploads:/var/www/uploads
    depends_on:
      - frontend
      - backend
    networks:
      - inbola_network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  inbola_network:
    driver: bridge
